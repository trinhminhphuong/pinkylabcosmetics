spring.config.import=optional:file:.env[.properties]
#APP
server.port=${SPRING_SERVER_PORT:8080}
spring.application.name=pinkylab
application.repository.query-limit-warning-ms=${QUERY_LIMIT_WARNING_MS:500}
app.frontend.origin=${APP_FRONTEND_ORIGIN:http://localhost:5173}

#DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${MYSQL_ROOT_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


#JPA / HIBERNATE
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

#JWT
jwt.secret=${JWT_SECRET}
#Expiration time (milliseconds)
#1 hour
jwt.access.expiration_time=${JWT_ACCESS_EXPIRATION_TIME}
#3 days
jwt.refresh.expiration_time=${JWT_REFRESH_EXPIRATION_TIME}

#Cloudinary
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

#Mail
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.host=smtp.gmail.com
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#Upload Image
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Redis Properties
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Redis Connection Optimization
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.timeout=2000ms

# Payment Config
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.api-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay/return}
vnpay.version=2.1.0
vnpay.command=pay

#Swagger
springdoc.api-docs.enabled=true
springdoc.packagesToScan=com.example.pinkylab.auth,com.example.pinkylab.product,com.example.pinkylab.order,com.example.pinkylab.cart,com.example.pinkylab.news,com.example.pinkylab.user,com.example.pinkylab.shared.web,com.example.pinkylab.payment
springdoc.pathsToMatch=/**

#Info Admin
app.admin.email=admin@minhphuong.com
app.admin.password=${ADMIN_PASSWORD}
app.admin.firstName=System
app.admin.lastName=Administrator
app.admin.phone=0123456789

#Security Endpoint
security.public-endpoints=/api/v1/auth/**,/api/v1/health/**,/api/v1/payment/vnpay/ipn
security.public-get-endpoints=/api/v1/categories,/api/v1/categories/{id},/api/v1/brands,/api/v1/brands/{id},/api/v1/tags,/api/v1/tags/{id},/api/v1/client-testimonials,/api/v1/client-testimonials/{id},/api/v1/professional-members,/api/v1/professional-members/{id},/api/v1/web-information,/api/v1/products,/api/v1/products/{id},/api/v1/products/*/reviews,/api/v1/reviews/{id},/api/v1/products/*/attributes,/api/v1/product-attributes/{id},/api/v1/products/*/promotions,/api/v1/product-promotions/{id},/api/v1/news-categories,/api/v1/news-categories/{id},/api/v1/news-tags,/api/v1/news-tags/{id},/api/v1/news,/api/v1/news/{id},/api/v1/news/category-counts,/api/v1/news/*/comments,/api/v1/news-comments/{id},/api/v1/payment-methods,/api/v1/payment-methods/{id},/api/v1/shipping-methods,/api/v1/shipping-methods/{id},/api/v1/payment/vnpay/return,/api/v1/payment/status/*
security.user-endpoints=/api/v1/user/**,/api/v1/cart/**,/api/v1/orders/me,/api/v1/orders,/api/v1/payment/create-payment
security.admin-endpoints=/api/v1/admin/**,/api/v1/products/*/images,/api/v1/products/*/tags,/api/v1/products/*/tags/*
security.swagger-endpoints=/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html

# Debug logging
#logging.level.org.springframework.security.oauth2=DEBUG
#logging.level.org.springframework.web.client=DEBUG
#logging.level.org.springframework.security.web=DEBUG
